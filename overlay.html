<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>字幕オーバーレイ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;          /* OBSで映像に重ねる */
    overflow: hidden;
  }
  /* ペイン＝話者1人ぶんの字幕ボックス（位置・背景はJSがboxes定義から適用）
     ソロ時は既定ペイン1つ／コラボ時は話者ごとに1つ */
  .pane { position: absolute; inset: 0; }
  .clip { position: absolute; inset: 0; overflow: hidden; }
  .scroller { position: absolute; left: 0; right: 0; bottom: 0; }
  .line { word-break: break-word; line-height: 1.35; }
  /* 英訳の併記行（各字幕行の下・小さめ薄め。サイズ/濃さはJSがstyleから適用） */
  .line .en { line-height: 1.25; font-weight: 600; }
</style>
<script src="/ui/fx.js"></script>
</head>
<body>

<script>
  const qp = new URLSearchParams(location.search);

  // サーバから来なければこの既定（旧CLI互換）
  const DEFAULT_STYLE = {
    font: "'Yu Gothic UI','Meiryo',sans-serif", weight: 800, size: 40,
    color: "#ffffff", outlineColor: "#000000", outlineWidth: 2,
    glow: "", glowSize: 0, shadow: true, hotColor: "#ffd400",
    animIn: "slide", partialOpacity: 0.55, letterSpacing: 0,
    enScale: 0.6, enOpacity: 0.82
  };
  const DEFAULT_BOX = {   // 既定はフリー（従来と同じ見た目）
    x: 0, y: 0, w: 100, h: 100, bg: "", bgOpacity: 0, radius: 0,
    padding: 28, borderColor: "", borderWidth: 0, align: "left",
    maxLines: 4, smooth: true, smoothMs: 250
  };

  let effects = [];        // エフェクト・ハイライト単語は話者間で共有
  let hotwords = [];
  let speakerNames = [];   // コラボ中の話者名（空=ソロ）

  const isLyric = (box) => (box.mode || "flow") === "lyric";

  // ---------------- ペイン（話者1人ぶんの描画一式） ----------------

  function makePane() {
    const boxEl = document.createElement("div");
    boxEl.className = "pane";
    const clipEl = document.createElement("div");
    clipEl.className = "clip";
    const scroller = document.createElement("div");
    scroller.className = "scroller";
    const finalsEl = document.createElement("div");
    const partialEl = document.createElement("div");
    partialEl.className = "line";
    scroller.append(finalsEl, partialEl);
    clipEl.append(scroller);
    boxEl.append(clipEl);
    document.body.appendChild(boxEl);
    return {
      boxEl, clipEl, scroller, finalsEl, partialEl,
      style: Object.assign({}, DEFAULT_STYLE),
      box: Object.assign({}, DEFAULT_BOX),
      table: [],
    };
  }

  const panes = new Map();       // 話者名 → ペイン（"" = ソロ/既定）
  panes.set("", makePane());

  // 未知の話者は既定ペインへ。コラボ中（既定は非表示）は先頭話者のペインへ
  function paneFor(spk) {
    spk = spk || "";
    if (panes.has(spk)) return panes.get(spk);
    if (speakerNames.length) return panes.get(speakerNames[0]);
    return panes.get("");
  }

  function applyPane(p) {
    // URLクエリは最優先で上書き
    const size = qp.get("size") || p.style.size;
    p.style.hotColor = qp.get("hot") || p.style.hotColor;
    if (qp.get("max")) p.box.maxLines = parseInt(qp.get("max"), 10);

    for (const el of [p.finalsEl, p.partialEl])
      FX.applyLineStyle(el, p.style, size);
    // 表示済みの英訳行にも新スタイルを即反映
    for (const el of p.finalsEl.querySelectorAll(".en")) styleEn(el, p.style);
    p.partialEl.style.opacity = p.style.partialOpacity ?? 0.55;
    FX.applyBox(p.boxEl, p.scroller, p.box, p.clipEl);
    // リリックモードでは認識途中は既定で非表示（設定でON可）
    p.partialEl.style.display =
      (isLyric(p.box) && !p.box.lyricPartial) ? "none" : "";
    p.table = FX.buildTable(hotwords, effects, p.style);
  }

  // style/init イベントからペイン構成を更新する。
  // speakers があればコラボ＝話者ペインを作り既定ペインは隠す（背景の二重描画防止）。
  // 無ければソロ＝既定ペインのみに戻す。
  function updatePanes(msg) {
    if (msg.effects) effects = msg.effects;
    if (msg.hotwords) hotwords = msg.hotwords;

    const def = panes.get("");
    if (msg.style) def.style = Object.assign({}, DEFAULT_STYLE, msg.style);
    if (msg.box) def.box = Object.assign({}, DEFAULT_BOX, msg.box);

    const spk = msg.speakers;
    // いなくなった話者のペインを撤去
    for (const name of [...panes.keys()])
      if (name !== "" && !(spk && spk[name])) {
        panes.get(name).boxEl.remove();
        panes.delete(name);
      }
    if (spk) {
      for (const [name, conf] of Object.entries(spk)) {
        let p = panes.get(name);
        if (!p) { p = makePane(); panes.set(name, p); }
        p.style = Object.assign({}, DEFAULT_STYLE, conf.style);
        p.box = Object.assign({}, DEFAULT_BOX, conf.box);
      }
      speakerNames = Object.keys(spk);
      def.boxEl.style.display = "none";
    } else {
      speakerNames = [];
      def.boxEl.style.display = "";
    }
    for (const p of panes.values()) applyPane(p);
  }

  // ---------------- 字幕の描画 ----------------

  function addFinal(p, text, id) {
    if (!text) { p.partialEl.textContent = ""; return; }

    if (isLyric(p.box)) {   // フレーズを画面に散らすタイポグラフィ演出
      p.partialEl.textContent = "";
      FX.lyricSpawn(p.boxEl, text, { style: p.style, table: p.table, box: p.box });
      return;
    }

    const div = document.createElement("div");
    div.className = "line";
    if (id != null) div.dataset.fid = id;   // 英訳を後から結び付けるための目印
    FX.renderWords(div, text, p.table, p.style);
    FX.applyEntrance(div, p.style.animIn || "slide");

    // 追加＋パーシャルのクリアをまとめてスムーズスクロール
    FX.smoothAppend(p.scroller, p.box, () => {
      p.partialEl.textContent = "";
      p.finalsEl.appendChild(div);
      while (p.finalsEl.children.length > (p.box.maxLines || 30))
        p.finalsEl.removeChild(p.finalsEl.firstChild);
    });
    FX.burstLine(div);          // パーティクル発射（登録単語があれば）
    // スクロール完了後、見切れた行をフェードアウトして掃除
    setTimeout(() => FX.pruneClipped(p.clipEl, p.finalsEl, p.box),
               (p.box.smoothMs || 250) + 80);
  }

  function setPartial(p, text) {
    // 薄文字（暫定表示）は既定でエフェクトなし＝プレーン。
    // style.partialFx が真のときだけ確定文字と同じ装飾を乗せる。
    if (p.style.partialFx)
      FX.renderWords(p.partialEl, text || "", p.table, p.style);
    else
      p.partialEl.textContent = text || "";
    // パーシャルが伸びて上の行が見切れたら掃除
    FX.pruneClipped(p.clipEl, p.finalsEl, p.box);
  }

  // 英訳行へプリセットの EN スタイル（サイズ/濃さ/色/フォント/縁取り/グロー）を適用
  function styleEn(el, style) {
    el.style.fontSize = (style.enScale ?? 0.6) + "em";
    el.style.opacity = style.enOpacity ?? 0.82;
    el.style.color = style.enColor || "";        // 空 = 本文と同じ色
    el.style.fontFamily = style.enFont || "";    // 空 = 本文と同じフォント
    if (style.enDeco) {                          // 専用の縁取り・グロー
      el.style.textShadow = FX.buildTextShadow({
        outlineWidth: style.enOutlineWidth ?? 2,
        outlineColor: style.enOutlineColor || "#000000",
        glow: (style.enGlowSize > 0 ? (style.enGlowColor || "#00e5ff") : ""),
        glowSize: style.enGlowSize || 0,
        shadow: style.shadow,
      });
    } else {
      el.style.textShadow = "";                  // 本文の縁取り・グローを継承
    }
  }

  // 確定行(fid)の下に英訳を差し込む。既に見切れて消えた行なら無視。
  // fid は話者をまたいで一意なので全ペインから探す。
  function addTranslation(id, en) {
    if (!en || id == null) return;
    for (const p of panes.values()) {
      const line = p.finalsEl.querySelector('.line[data-fid="' + id + '"]');
      if (!line) continue;
      let el = line.querySelector(".en");
      if (!el) {
        el = document.createElement("div");
        el.className = "en";
        line.appendChild(el);
      }
      styleEn(el, p.style);
      el.textContent = en;
      return;
    }
  }

  function handle(msg) {
    switch (msg.type) {
      case "init":
      case "style":
        updatePanes(msg);
        break;
      case "final":   addFinal(paneFor(msg.speaker), msg.text, msg.id); break;
      case "translation": addTranslation(msg.id, msg.text); break;
      case "partial": setPartial(paneFor(msg.speaker), msg.text); break;
      case "clear":
        for (const p of panes.values()) {
          p.finalsEl.textContent = ""; p.partialEl.textContent = "";
          FX.lyricClear(p.boxEl);
        }
        break;
    }
  }

  function connect() {
    const es = new EventSource("/events");
    es.onmessage = (e) => handle(JSON.parse(e.data));
    es.onerror = () => { es.close(); setTimeout(connect, 1000); };
  }
  for (const p of panes.values()) applyPane(p);
  connect();
</script>
</body>
</html>
