<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Mojicast</title>
<script>
  // 起動モニタに合わせたUI縮小（app.pyが ?s= で倍率を渡す。FullHDで約0.8）
  (function () {
    const s = parseFloat(new URLSearchParams(location.search).get("s"));
    if (s > 0 && s < 1) document.documentElement.style.zoom = s;
  })();
</script>
<style>
  :root {
    --bg: #0d1117; --panel: #161c26; --panel2: #1c2432;
    --line: #2a3547; --text: #dce6f5; --dim: #7d8ba1;
    --accent: #00e5ff; --accent2: #ff2d95; --ok: #3dffa0; --warn: #ffb84d; --err: #ff5c5c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Yu Gothic UI', 'Meiryo', sans-serif;
    font-size: 14px; height: 100vh; display: flex; flex-direction: column;
    user-select: none; overflow: hidden;
  }
  /* ---------- ヘッダー ---------- */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 16px; background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .logo { font-weight: 900; font-size: 16px; letter-spacing: .12em; }
  .logo b { color: var(--accent); }
  .led {
    width: 10px; height: 10px; border-radius: 50%;
    background: #555; transition: all .3s;
  }
  .led.running { background: var(--ok); box-shadow: 0 0 10px var(--ok); }
  .led.loading { background: var(--warn); box-shadow: 0 0 10px var(--warn); animation: blink 1s infinite; }
  .led.error   { background: var(--err); box-shadow: 0 0 10px var(--err); }
  @keyframes blink { 50% { opacity: .3; } }
  #stateText { color: var(--dim); min-width: 160px; }
  .spacer { flex: 1; }
  /* ---------- ボタン ---------- */
  button {
    background: var(--panel2); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 14px; cursor: pointer; font-family: inherit; font-size: 13px;
    transition: all .15s;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  #btnEngine {
    font-size: 15px; font-weight: 800; padding: 10px 26px;
    border-radius: 24px; border: 2px solid var(--ok); color: var(--ok);
  }
  #btnEngine.on { border-color: var(--err); color: var(--err); }
  #btnEngine:disabled { opacity: .5; cursor: wait; }
  /* ---------- レイアウト ---------- */
  main { flex: 1; display: grid; grid-template-columns: 270px 1fr 260px; gap: 10px; padding: 10px; min-height: 0; }
  .panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px; overflow-y: auto;
  }
  .panel h2 {
    font-size: 11px; letter-spacing: .2em; color: var(--dim);
    margin-bottom: 12px; border-bottom: 1px solid var(--line); padding-bottom: 6px;
  }
  .row { margin-bottom: 14px; }
  .row label { display: flex; justify-content: space-between; color: var(--dim); margin-bottom: 4px; }
  .row label output { color: var(--accent); font-weight: 700; }
  input[type=range] { width: 100%; accent-color: var(--accent); }
  select, input[type=text] {
    width: 100%; background: var(--panel2); color: var(--text);
    border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; font-family: inherit;
  }
  .toggle { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; color: var(--dim); }
  .toggle input { accent-color: var(--accent); width: 16px; height: 16px; }
  /* レベルメーター */
  #meter { width: 100%; height: 14px; background: var(--panel2); border-radius: 7px; overflow: hidden; border: 1px solid var(--line); }
  #meterBar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--ok), var(--warn) 70%, var(--err)); transition: width .08s linear; }
  /* ---------- モニタ ---------- */
  #monitor {
    display: flex; flex-direction: column; justify-content: flex-end;
    background: repeating-linear-gradient(0deg, #10151d, #10151d 2px, #121826 2px, #121826 4px);
    border-radius: 8px; padding: 16px; flex: 1; overflow: hidden;
    font-size: 20px; font-weight: 700; line-height: 1.5; min-height: 0;
  }
  #monitor .p { opacity: .45; }
  #monitor .en { font-size: .62em; font-weight: 600; opacity: .6; color: var(--dim); }
  .mon-head { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
  .mon-head .rec { color: var(--err); font-size: 11px; letter-spacing: .15em; opacity: 0; }
  .mon-head .rec.on { opacity: 1; animation: blink 1.2s infinite; }
  #centerPanel { display: flex; flex-direction: column; }
  /* ---------- プリセット ---------- */
  .preset {
    border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: all .15s;
    position: relative;
  }
  .preset:hover { border-color: var(--accent); }
  .preset.active { border-color: var(--accent); background: var(--panel2); box-shadow: 0 0 12px rgba(0,229,255,.15); }
  .preset .nm { font-weight: 800; margin-bottom: 2px; }
  .preset .ds { color: var(--dim); font-size: 12px; }
  .preset .edit {
    position: absolute; top: 8px; right: 8px;
    background: none; border: none; color: var(--dim); cursor: pointer;
    font-size: 13px; padding: 2px 6px;
  }
  .preset .edit:hover { color: var(--accent); }
  .obs {
    display: flex; gap: 6px; margin-top: 10px;
  }
  .obs input { flex: 1; font-size: 12px; color: var(--dim); }
  footer { padding: 6px 16px; color: var(--dim); font-size: 11px; border-top: 1px solid var(--line); background: var(--panel); }
  .hint { color: var(--dim); font-size: 11px; margin-top: 4px; }
</style>
</head>
<body>
  <header>
    <div class="logo">MOJI<b>CAST</b></div>
    <div class="led" id="led"></div>
    <div id="stateText">停止中</div>
    <div class="spacer"></div>
    <button onclick="clearCaptions()">表示クリア</button>
    <button onclick="openWords()">✦ 単語スタジオ</button>
    <button id="btnEngine" onclick="toggleEngine()">▶ 開始</button>
  </header>

  <main>
    <!-- ========== 左: 入力・認識設定 ========== -->
    <section class="panel">
      <h2>INPUT / RECOGNITION</h2>
      <div class="row">
        <label>マイク</label>
        <select id="device"></select>
      </div>
      <div class="row">
        <label>入力レベル</label>
        <div id="meter"><div id="meterBar"></div></div>
      </div>
      <div class="row">
        <label>無音で確定 <output id="oSilence">300ms</output></label>
        <input type="range" id="silence" min="100" max="800" step="50" value="300">
      </div>
      <div class="row">
        <label>途中更新間隔 <output id="oInterval">0.4s</output></label>
        <input type="range" id="interval" min="0.2" max="1.0" step="0.1" value="0.4">
      </div>
      <div class="row">
        <label>最大発話長 <output id="oMax">12s</output></label>
        <input type="range" id="maxUtt" min="5" max="30" step="1" value="12">
      </div>
      <div class="row">
        <label>単語ブースト <output id="oScore">2.0</output></label>
        <input type="range" id="score" min="1.0" max="4.0" step="0.5" value="2.0">
      </div>
      <div class="toggle"><span>句読点をつける</span><input type="checkbox" id="punct" checked></div>
      <div class="toggle"><span>単語登録を使う</span><input type="checkbox" id="useHot" checked></div>
      <div class="toggle"><span>英訳を表示（各行の下）</span><input type="checkbox" id="translate"></div>
      <div class="toggle"><span>文字起こしログを保存</span><input type="checkbox" id="saveLog" checked></div>
      <div class="toggle"><span>高精度モード(fp32)</span><input type="checkbox" id="fp32"></div>
      <div class="hint" id="restartHint" style="display:none">⚠ 設定変更は次回開始時に反映</div>
    </section>

    <!-- ========== 中央: 字幕モニタ ========== -->
    <section class="panel" id="centerPanel">
      <div class="mon-head">
        <h2 style="margin:0;border:0;padding:0">CAPTION MONITOR</h2>
        <span class="rec" id="rec">● REC</span>
      </div>
      <div id="monitor"></div>
    </section>

    <!-- ========== 右: プリセット・レイアウト・OBS ========== -->
    <section class="panel">
      <h2>STYLE PRESET</h2>
      <div id="presets"></div>
      <h2 style="margin-top:16px">LAYOUT BOX</h2>
      <div id="boxes"></div>
      <h2 style="margin-top:16px">OBS 連携</h2>
      <div class="ds" style="color:var(--dim);font-size:12px">
        OBSの「ブラウザソース」にこのURLを設定
      </div>
      <div class="obs">
        <input type="text" id="obsUrl" readonly>
        <button onclick="copyUrl()">コピー</button>
      </div>
      <div class="hint">推奨サイズ: 配信解像度と同じ（例 1920×1080）</div>
    </section>
  </main>

  <footer>Mojicast <span id="verTag"></span> — ReazonSpeech k2 + Silero VAD + BERT句読点 / ローカル完結・オフライン動作</footer>

<script>
  const $ = (id) => document.getElementById(id);
  let cfg = {};
  let running = false;
  let presets = [];
  let boxes = [];

  // ---------- 設定の読み込み・保存 ----------
  async function api(path, body) {
    const opt = body ? { method: "POST", body: JSON.stringify(body) } : {};
    const r = await fetch(path, opt);
    return r.json();
  }

  const saveCfg = debounce(async () => {
    await api("/api/config", cfg);
    if (running) $("restartHint").style.display = "block";
  }, 400);

  function debounce(fn, ms) {
    let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  }

  function bindRange(id, key, outId, fmt, scale) {
    const el = $(id);
    el.addEventListener("input", () => {
      $(outId).textContent = fmt(el.value);
      cfg[key] = +el.value * (scale || 1);
      saveCfg();
    });
  }
  bindRange("silence", "silence_ms", "oSilence", v => v + "ms");
  bindRange("interval", "interval", "oInterval", v => v + "s");
  bindRange("maxUtt", "max_utt", "oMax", v => v + "s");
  bindRange("score", "hotwords_score", "oScore", v => (+v).toFixed(1));

  $("punct").addEventListener("change", e => { cfg.punctuate = e.target.checked; saveCfg(); });
  $("useHot").addEventListener("change", e => { cfg.use_hotwords = e.target.checked; saveCfg(); });
  $("translate").addEventListener("change", e => { cfg.translate = e.target.checked; saveCfg(); });
  $("saveLog").addEventListener("change", e => { cfg.save_log = e.target.checked; saveCfg(); });
  $("fp32").addEventListener("change", e => { cfg.precision = e.target.checked ? "fp32" : "int8-fp32"; saveCfg(); });
  $("device").addEventListener("change", e => {
    cfg.device = e.target.value === "default" ? null : +e.target.value; saveCfg();
  });

  async function loadAll() {
    cfg = await api("/api/config");
    if (cfg.version) $("verTag").textContent = "v" + cfg.version;
    $("silence").value = cfg.silence_ms; $("oSilence").textContent = cfg.silence_ms + "ms";
    $("interval").value = cfg.interval;  $("oInterval").textContent = cfg.interval + "s";
    $("maxUtt").value = cfg.max_utt;     $("oMax").textContent = cfg.max_utt + "s";
    $("score").value = cfg.hotwords_score; $("oScore").textContent = (+cfg.hotwords_score).toFixed(1);
    $("punct").checked = cfg.punctuate;
    $("useHot").checked = cfg.use_hotwords;
    $("translate").checked = !!cfg.translate;
    $("saveLog").checked = cfg.save_log !== false;
    $("fp32").checked = cfg.precision === "fp32";
    $("obsUrl").value = location.origin + "/";

    const dv = await api("/api/devices");
    const sel = $("device");
    sel.innerHTML = '<option value="default">既定のマイク</option>';
    for (const d of dv.devices || []) {
      const o = document.createElement("option");
      o.value = d.index; o.textContent = d.name + (d.default ? " (既定)" : "");
      sel.appendChild(o);
    }
    if (cfg.device !== null && cfg.device !== undefined) sel.value = cfg.device;

    presets = (await api("/api/presets")).presets || [];
    boxes = (await api("/api/boxes")).boxes || [];
    renderPresets();
    renderBoxes();
  }

  // ---------- プリセット ----------
  function renderPresets() {
    const box = $("presets");
    box.innerHTML = "";
    for (const p of presets) {
      const div = document.createElement("div");
      div.className = "preset" + (p.id === cfg.preset ? " active" : "");
      div.innerHTML = `<div class="nm">${p.name}</div><div class="ds">${p.desc}</div>
        <button class="edit" title="このプリセットを編集">✎</button>`;
      div.onclick = async () => {
        cfg.preset = p.id;
        await api("/api/config", { preset: p.id });
        renderPresets();
      };
      div.querySelector(".edit").onclick = (e) => {
        e.stopPropagation();
        openStyle("preset=" + p.id);
      };
      box.appendChild(div);
    }
  }

  async function refreshPresets() {   // スタイルスタジオでの保存を反映
    cfg = await api("/api/config");
    presets = (await api("/api/presets")).presets || [];
    boxes = (await api("/api/boxes")).boxes || [];
    renderPresets();
    renderBoxes();
  }

  function renderBoxes() {
    const el = $("boxes");
    el.innerHTML = "";
    for (const b of boxes) {
      const div = document.createElement("div");
      div.className = "preset" + (b.id === cfg.box ? " active" : "");
      div.innerHTML = `<div class="nm">${b.name}</div><div class="ds">${b.desc || ""}</div>
        <button class="edit" title="このボックスを編集">✎</button>`;
      div.onclick = async () => {
        cfg.box = b.id;
        await api("/api/config", { box: b.id });
        renderBoxes();
      };
      div.querySelector(".edit").onclick = (e) => {
        e.stopPropagation();
        openStyle("tab=box&box=" + b.id);
      };
      el.appendChild(div);
    }
  }

  // ---------- エンジン ----------
  async function toggleEngine() {
    $("btnEngine").disabled = true;
    await api("/api/engine", { action: running ? "stop" : "start" });
    setTimeout(() => { $("btnEngine").disabled = false; }, 800);
  }

  function setState(state, detail) {
    const led = $("led");
    led.className = "led " + state;
    running = state === "running";
    $("rec").className = "rec" + (running ? " on" : "");
    const btn = $("btnEngine");
    btn.className = running ? "on" : "";
    btn.textContent = running ? "■ 停止" : "▶ 開始";
    btn.disabled = state === "loading";
    $("stateText").textContent = detail ||
      ({ running: "認識中", stopped: "停止中", loading: "ロード中...", error: "エラー" }[state] || state);
    if (!running) $("restartHint").style.display = "none";
  }

  async function clearCaptions() { await api("/api/clear", {}); }

  function copyUrl() {
    const el = $("obsUrl");
    el.select();
    try { navigator.clipboard.writeText(el.value); } catch (e) { document.execCommand("copy"); }
  }

  // ---------- 単語スタジオ / スタイルスタジオ（別窓） ----------
  function openWords() {
    if (window.pywebview && window.pywebview.api && window.pywebview.api.open_words) {
      window.pywebview.api.open_words();
    } else {
      window.open("/ui/words", "_blank", "width=920,height=640");
    }
  }
  function openStyle(query) {
    if (window.pywebview && window.pywebview.api && window.pywebview.api.open_style) {
      window.pywebview.api.open_style(query || "");
    } else {
      window.open("/ui/style?" + (query || ""), "_blank", "width=1000,height=800");
    }
  }

  // ---------- モニタ（SSE） ----------
  const MON_MAX = 6;
  const monitor = $("monitor");
  let partialDiv = null;

  function monPartial(text) {
    if (!partialDiv) {
      partialDiv = document.createElement("div");
      partialDiv.className = "p";
      monitor.appendChild(partialDiv);
    }
    partialDiv.textContent = text || "";
    monitor.scrollTop = monitor.scrollHeight;
  }
  function monFinal(text, id) {
    if (partialDiv) { partialDiv.remove(); partialDiv = null; }
    if (!text) return;
    const d = document.createElement("div");
    if (id != null) d.dataset.fid = id;
    d.textContent = text;
    monitor.appendChild(d);
    while (monitor.children.length > MON_MAX) monitor.removeChild(monitor.firstChild);
    monitor.scrollTop = monitor.scrollHeight;
  }
  function monTranslation(id, en) {
    if (!en || id == null) return;
    const d = monitor.querySelector('[data-fid="' + id + '"]');
    if (!d) return;
    let el = d.querySelector(".en");
    if (!el) { el = document.createElement("div"); el.className = "en"; d.appendChild(el); }
    el.textContent = en;
  }

  function connect() {
    const es = new EventSource("/events");
    es.onmessage = (e) => {
      const m = JSON.parse(e.data);
      if (m.type === "state") setState(m.state, m.detail);
      else if (m.type === "init" && m.state) setState(m.state.state, m.state.detail);
      else if (m.type === "partial") monPartial(m.text);
      else if (m.type === "final") monFinal(m.text, m.id);
      else if (m.type === "translation") monTranslation(m.id, m.text);
      else if (m.type === "level") $("meterBar").style.width = (m.value * 100) + "%";
      else if (m.type === "clear") { monitor.innerHTML = ""; partialDiv = null; }
      else if (m.type === "style") refreshPresets();
    };
    es.onerror = () => { es.close(); setTimeout(connect, 1000); };
  }

  loadAll();
  connect();
</script>
</body>
</html>
